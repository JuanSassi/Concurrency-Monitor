name: Java CI · Gradle

on:
  push:
    branches: [ "main", "2.0.0" ]
  pull_request:
    branches: [ "main", "2.0.0" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  ## ── 1. Formato · Spotless (≈ black + isort) ──────────────
  formato:
    name: Formato (Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Dar permisos al wrapper
        run: chmod +x ./gradlew
      - name: Verificar formato
        run: ./gradlew spotlessCheck --no-daemon

  ## ── 2. Linting · Checkstyle + PMD (≈ flake8) ────────────
  linting:
    name: Linting (Checkstyle + PMD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Dar permisos al wrapper
        run: chmod +x ./gradlew
      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon
      - name: PMD
        run: ./gradlew pmdMain pmdTest --no-daemon

  ## ── 3. Reproducibilidad de dependencias ─────────────────
  reproducibilidad:
    name: Verificar lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Dar permisos al wrapper
        run: chmod +x ./gradlew
      - name: Verificar hashes de dependencias
        run: ./gradlew dependencies --write-verification-metadata sha256 --no-daemon
      - name: Detectar drift en verification-metadata.xml
        run: |
          git diff --exit-code gradle/verification-metadata.xml \
            || (echo "❌ verification-metadata.xml desactualizado — regeneralo localmente y commitealo" && exit 1)

  ## ── 4. Tests + Coverage + SpotBugs ──────────────────────
  tests:
    name: Tests · JaCoCo · SpotBugs
    runs-on: ubuntu-latest
    needs: [ formato, linting, reproducibilidad ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Dar permisos al wrapper
        run: chmod +x ./gradlew
      - name: Tests + SpotBugs + Coverage
        run: ./gradlew test spotbugsMain jacocoTestReport jacocoTestCoverageVerification --no-daemon

      - name: Publicar resultados JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Reporte cobertura JaCoCo en PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      - name: Subir reportes como artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reportes-ci
          path: |
            build/reports/tests/
            build/reports/jacoco/
            build/reports/spotbugs/

  ## ── 5. SonarCloud (opcional — borrar si no se usa) ───────
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Dar permisos al wrapper
        run: chmod +x ./gradlew
      - name: Análisis SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew test jacocoTestReport sonar --no-daemon \
            -Dsonar.projectKey=TU_ORG_Concurrency-Monitor \
            -Dsonar.organization=TU_ORG \
            -Dsonar.host.url=https://sonarcloud.io